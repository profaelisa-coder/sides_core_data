<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sides_core_data_v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div id="portal-page" class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight">CORE PRIZE</h1>
            <p class="text-blue-600 font-bold uppercase text-sm tracking-widest">Manager v1.0</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-500 uppercase mb-2">ID do Evento</label>
                <input type="text" id="event-id-input" placeholder="" 
                       class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition-all text-lg font-bold uppercase">
                <p class="text-xs text-gray-400 mt-2">Digite o ID fornecido pela organização.</p>
            </div>
            
            <button onclick="checkAccess()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase tracking-wide">
                Acessar Sistema
            </button>
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-100 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            <span>sides_core_data - 2026 Edition</span>
        </div>
    </div>

    <script>
        function checkAccess() {
            const input = document.getElementById('event-id-input');
            const id = input.value.trim().toUpperCase();
            
            if (!id) {
                alert("⚠️ Digite o ID do Evento!");
                return;
            }

            // LÓGICA DE FILTRO (BABY STEP)
            if (id.endsWith('_LEAD') || id.endsWith('_TO')) {
                alert("👑 ACESSO GESTÃO: Identificamos um LEAD/TO. Próximo passo: Tela de Cadastro.");
                // Aqui abriremos a Página 2
            } else {
                alert("📱 ACESSO STAFF: Identificamos um STAFF. Próximo passo: Calculadora.");
                // Aqui abriremos a Página 3
            }
        }
    </script>
</body>
</html>
