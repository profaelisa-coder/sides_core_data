<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sides_core_data_v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div id="portal-page" class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight">CORE PRIZE</h1>
            <p class="text-blue-600 font-bold uppercase text-sm tracking-widest">Manager v1.0</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-500 uppercase mb-2 text-gray-400">ID do Evento</label>
                <input type="text" id="event-id-input" class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition-all text-lg font-bold uppercase text-gray-800">
            </div>
            
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 uppercase tracking-wide">
                Acessar Sistema
            </button>
        </div>
        
        <div class="mt-10 pt-6 border-t border-gray-100 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            <span>sides_core_data - 2026 Edition</span>
        </div>
    </div>

    <div id="lead-setup-page" class="hidden bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-green-600">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-gray-800 uppercase">Configurar Gestão</h2>
            <p class="text-green-600 text-xs font-bold uppercase tracking-wider">Novo Evento Detectado</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="lead-name" placeholder="NOME COMPLETO" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-green-500 uppercase font-bold text-sm">
            <input type="email" id="lead-email" placeholder="E-MAIL DE CONTATO" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-green-500 uppercase font-bold text-sm">
            <input type="password" id="lead-pass" placeholder="SENHA DE 6 DÍGITOS" maxlength="6" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
            
            <button onclick="saveLead()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 uppercase">
                Confirmar e Iniciar
            </button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        
        // Criando a conexão
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentEventID = '';

        function checkAccess() {
            const input = document.getElementById('event-id-input');
            const id = input.value.trim().toUpperCase();
            
            if (!id) {
                alert("⚠️ Digite o ID do Evento!");
                return;
            }

            currentEventID = id;

            if (id.endsWith('_LEAD')) {
                // MÁGICA: Esconde uma tela e mostra a outra
                document.getElementById('portal-page').classList.add('hidden');
                document.getElementById('lead-setup-page').classList.remove('hidden');
            } else {
                alert("📱 ACESSO STAFF: ID " + id + " validado. Aguarde a calculadora.");
            }
        }

       async function saveLead() {
            const name = document.getElementById('lead-name').value.trim();
            const email = document.getElementById('lead-email').value.trim();
            const pass = document.getElementById('lead-pass').value.trim();

            if (!name || !email || !pass) {
                return alert("⚠️ Ei! Preencha todos os campos antes de continuar.");
            }

            // MÁGICA: Inserindo o primeiro dado no Supabase!
            const { data, error } = await _supabase
                .from('tournament_catalog')
                .insert([
                    { 
                        event_id: currentEventID, 
                        name: name 
                    }
                ])
                .select();

            if (error) {
                console.error("Erro no Supabase:", error);
                alert("❌ Ops, algo deu errado: " + error.message);
            } else {
                alert("🚀 SUCESSO ABSOLUTO! O evento " + currentEventID + " agora existe no seu banco de dados!");
                console.log("Dados salvos:", data);
                
                // Por enquanto, vamos apenas dar um "reset" para você ver que funcionou
                location.reload(); 
            }
        }
    </script>
</body>
</html>
