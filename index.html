<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Prize Manager v3.0 - Royal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-red: #e63946; --dark: #1d3557; --gold: #ffb703; --green: #2a9d8f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-panel { background: #1d3557; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 5px solid var(--gold); }
        .staff-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: none; }
        .grid-inputs { display: grid; grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr 0.8fr auto; gap: 12px; margin-bottom: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #ccc; text-transform: uppercase; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9rem; }
        .tourney-list { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); margin-top: 10px; }
        .tourney-list td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; color: white !important; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-lock, .btn-close-event { background: #1a7a7a; color: white; width: 100%; margin-top: 15px; }
        .btn-reset { background: var(--gold); color: #1d3557; width: 100%; margin-top: 15px; border-bottom: 3px solid #cc9200; }
        .btn-update { background: var(--primary-red); color: white; }
        .payout-page, .report-page { background: white; width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto; display: none; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header-payout { text-align: center; border-bottom: 3px solid var(--dark); padding-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th { background: var(--dark); color: white; padding: 10px; }
        .report-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        @media print { .no-print { display: none !important; } .payout-page, .report-page { display: block !important; box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

    <div id="login-area" class="no-print">
        <div class="login-card" style="background:white; padding:40px; border-radius:15px; text-align:center; width:350px; margin: 80px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h2 style="color: var(--dark);">CORE PRIZE</h2>
            <input type="password" id="event-id-input" placeholder="ENTER ACCESS CODE" 
                   autocomplete="new-password" spellcheck="false" 
                   style="width:100%; margin: 20px 0; text-transform: uppercase; padding:12px; letter-spacing: 4px; text-align: center; border: 1px solid #ddd; border-radius: 8px;">
            <button onclick="checkAccess()" style="background: var(--dark); color: white; width: 100%;">Access System</button>
        </div>
    </div>

    <div id="emailSetupArea" class="no-print" style="display:none; text-align:center; margin-top: 50px;">
        <div class="admin-panel" style="width:400px; margin:auto;">
            <h3>📧 COMMUNICATION SETUP</h3>
            <input type="email" id="toEmail" placeholder="TO Email" style="width:90%; margin-bottom:10px;">
            <input type="email" id="leadEmail" placeholder="Lead Email" style="width:90%; margin-bottom:20px;">
            <button onclick="saveEmailsAndGo()" style="background:var(--green); color:white; width:90%;">START SETUP</button>
        </div>
    </div>

    <div id="setupArea" class="admin-panel no-print" style="display: none;">
        <h3>🛡️ ADMIN SETUP</h3>
        <div class="grid-inputs">
            <div class="input-group"><label>Event Name</label><input type="text" id="masterEvent"></div>
            <div class="input-group"><label>Logo</label><select id="masterLogo"><option value="REGIONAL">REGIONAL</option><option value="IC">IC</option></select></div>
            <div class="input-group"><label>Part. %</label><input type="number" id="masterTax" value="20"></div>
            <div class="input-group"><label>Spread Factor</label>
                <select id="masterFactor">
                    <option value="2.0">2.0 (Aggressive)</option>
                    <option value="1.75" selected>1.75 (Balanced)</option>
                    <option value="1.5">1.5 (Flat)</option>
                </select>
            </div>
        </div>
        <h4>📅 Tournament Catalog</h4>
        <div class="grid-inputs">
            <div class="input-group"><label>Name</label><input type="text" id="tName"></div>
            <div class="input-group"><label>Hour</label><input type="text" id="tHour"></div>
            <div class="input-group"><label>Day</label><select id="tDay"><option value="Day 1">Day 1</option><option value="Day 2">Day 2</option><option value="Day 3">Day 3</option></select></div>
            <div class="input-group"><label>Fee</label><input type="number" id="tFee"></div>
            <div class="input-group"><label>Cost</label><input type="number" id="tCost"></div>
            <button onclick="addTournament()" style="background:var(--gold); height:42px;">+ ADD</button>
        </div>
        <table class="tourney-list" id="catalogTable"><tbody></tbody></table>
        
        <button class="btn-lock" onclick="lockSetup()">🔒 LOCK TO STAFF</button>
        <button class="btn-close-event" onclick="showFinalReport()">📊 GENERATE FINAL REPORT</button>
        <button class="btn-reset" onclick="resetSystem()">⚠️ RESET SYSTEM</button>
    </div>

    <div id="staffArea" class="staff-panel no-print">
        <h3>🕹️ STAFF OPERATION <button onclick="unlockSetup()" style="font-size:0.6rem">Back</button></h3>
        <select id="staffSelectTourney" onchange="updateStaffFee()" style="width:100%; margin-bottom:10px; padding:10px;"></select>
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1"><label>Players</label><input type="number" id="staffPlayers" value="0"></div>
            <div class="input-group" style="flex:1"><label>Fee</label><input type="number" id="staffFee" disabled></div>
        </div>
        <button class="btn-update" onclick="generatePayout()" style="width:100%; margin-top:15px; padding:15px;">UPDATE VIEW</button>
    </div>

    <div id="printArea" class="payout-page">
        <div class="header-payout">
            <img id="outLogoImg" src="" style="height:60px;">
            <h1 id="outEventName" style="text-transform:uppercase;"></h1>
            <h2 id="outTourneyName" style="color:var(--primary-red); margin:5px 0;"></h2>
            <p id="outDetails" style="font-weight:bold;"></p>
        </div>
        <table class="payout-table" style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead><tr style="background:var(--dark); color:white;"><th>RANK</th><th>TICKETS</th></tr></thead>
            <tbody id="payoutBody"></tbody>
        </table>
    </div>

    <div id="reportArea" class="report-page">
        <div class="header-payout">
            <h1 id="repEventName"></h1>
            <h3>CONSOLIDATED FINAL REPORT</h3>
        </div>
        <table class="report-table">
            <thead><tr><th>Tournament</th><th>Players</th><th>Revenue</th><th>Expense</th><th>Tickets</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let tournamentCatalog = [];
        let currentEventID = '';
        let historyData = [];

        async function checkAccess() {
            const idInput = document.getElementById('event-id-input');
            const rawId = idInput.value.trim().toUpperCase();
            if(!rawId) return;

            // REGRA LEAD: 3 Letras + 4 Números + _LEAD
            const leadRegex = /^[A-Z]{3}\d{4}_LEAD$/;
            // REGRA STAFF: 3 Letras + 2 Números
            const staffRegex = /^[A-Z]{3}\d{2}$/;

            if (leadRegex.test(rawId)) {
                currentEventID = rawId;
                document.getElementById('login-area').style.display='none';
                document.getElementById('emailSetupArea').style.display='block';
            } else if (staffRegex.test(rawId)) {
                const prefix = rawId.substring(0, 3); 
                const yearShort = rawId.substring(3, 5); 
                const searchID = prefix + "20" + yearShort + "_LEAD";

                const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', searchID);
                if(data && data.length > 0) {
                    currentEventID = searchID;
                    document.getElementById('login-area').style.display='none';
                    document.getElementById('staffArea').style.display='block';
                    loadTournaments();
                } else alert("ACCESS DENIED: Event not found.");
            } else {
                alert("FORMAT ERROR: Use XXX0000_LEAD or XXX00");
            }
            idInput.value = "";
        }

        async function loadTournaments() {
            const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', currentEventID);
            tournamentCatalog = data || [];
            const select = document.getElementById('staffSelectTourney');
            const tbody = document.querySelector('#catalogTable tbody');
            select.innerHTML = ""; tbody.innerHTML = "";
            tournamentCatalog.forEach((t, i) => {
                select.innerHTML += `<option value="${i}">${t.t_hour} - ${t.name}</option>`;
                tbody.innerHTML += `<tr><td>${t.name}</td><td><button onclick="removeT(${t.id})">❌</button></td></tr>`;
            });
            updateStaffFee();
        }

        async function addTournament() {
            const t = {
                event_id: currentEventID,
                name: document.getElementById('tName').value,
                t_date: document.getElementById('tDay').value,
                t_hour: document.getElementById('tHour').value,
                t_fee: parseFloat(document.getElementById('tFee').value),
                t_cost: parseFloat(document.getElementById('tCost').value) || 0
            };
            await _supabase.from('tournament_catalog').insert([t]);
            loadTournaments();
        }

        function updateStaffFee() {
            const t = tournamentCatalog[document.getElementById('staffSelectTourney').value];
            if(t) document.getElementById('staffFee').value = t.t_fee;
        }

        function getPayoutRank(p) {
            if (p >= 227) return 128; if (p >= 129) return 64; if (p >= 65) return 32;
            if (p >= 33) return 16; if (p >= 17) return 8; if (p >= 9) return 4; return 2;
        }
        function round10(val) { return Math.round(val / 10) * 10; }

        function generatePayout() {
            const t = tournamentCatalog[document.getElementById('staffSelectTourney').value];
            const p = parseInt(document.getElementById('staffPlayers').value) || 0;
            const factor = parseFloat(document.getElementById('masterFactor').value);
            const tax = (parseFloat(document.getElementById('masterTax').value) || 0) / 100;
            
            if(p < 4) return alert("Min 4 players");

            const fee = parseFloat(t.t_fee) || 0;
            const cost = parseFloat(t.t_cost) || 0;
            
            // MATEMÁTICA CORRIGIDA TPCI (BS) - PRIORIDADE FEE-COST
            const totalTicketsLimit = Math.max(0, (fee - cost) * p * 10);
            const partIndiv = round10((totalTicketsLimit * tax) / p);
            const pool = totalTicketsLimit - (partIndiv * p);
            const payoutRank = getPayoutRank(p);

            let tiers = [];
            if (payoutRank >= 1) tiers.push({name: "1st Place", count: 1});
            if (payoutRank >= 2) tiers.push({name: "2nd Place", count: 1});
            if (payoutRank >= 4) tiers.push({name: "3rd - 4th", count: 2});
            if (payoutRank >= 8) tiers.push({name: "5th - 8th", count: 4});
            if (payoutRank >= 16) tiers.push({name: "9th - 16th", count: 8});
            if (payoutRank >= 32) tiers.push({name: "17th - 32nd", count: 16});

            let totalW = 0;
            for (let i = 0; i < tiers.length; i++) {
                tiers[i].weight = Math.pow(factor, (tiers.length - 1) - i);
                totalW += (tiers[i].weight * tiers[i].count);
            }

            const unit = pool / totalW;
            let currentTotal = partIndiv * p;
            const body = document.getElementById('payoutBody'); body.innerHTML = "";

            for (let i = 0; i < tiers.length; i++) {
                let prize = round10(unit * tiers[i].weight) + partIndiv;
                body.innerHTML += `<tr><td style="padding:10px">${tiers[i].name}</td><td style="font-weight:bold">${prize.toLocaleString()}</td></tr>`;
                currentTotal += (round10(unit * tiers[i].weight) * tiers[i].count);
            }
            body.innerHTML += `<tr style="background:#f9f9f9; font-style:italic"><td>Participation</td><td>${partIndiv.toLocaleString()}</td></tr>`;

            document.getElementById('outEventName').innerText = document.getElementById('masterEvent').value;
            document.getElementById('outTourneyName').innerText = t.name;
            document.getElementById('outLogoImg').src = document.getElementById('masterLogo').value === "REGIONAL" ? "reg.PNG" : "ic.png";
            document.getElementById('outDetails').innerText = `Players: ${p} | Entry: $${fee} | Cost: $${cost}`;
            document.getElementById('printArea').style.display = 'block';

            historyData.push({name: t.name, players: p, rev: p*fee, exp: p*cost, tickets: currentTotal});
        }

        function showFinalReport() {
            const tbody = document.getElementById('reportTableBody'); tbody.innerHTML = "";
            historyData.forEach(h => {
                tbody.innerHTML += `<tr><td>${h.name}</td><td>${h.players}</td><td>$${h.rev.toFixed(2)}</td><td>$${h.exp.toFixed(2)}</td><td>${h.tickets.toLocaleString()}</td></tr>`;
            });
            document.getElementById('repEventName').innerText = document.getElementById('masterEvent').value;
            document.getElementById('reportArea').style.display = 'block';
            document.getElementById('printArea').style.display = 'none';
            window.print();
        }

        function unlockSetup() {
            const masterPass = currentEventID.replace('_LEAD', ''); 
            if(prompt("ENTER MASTER PASSWORD:") === masterPass) {
                document.getElementById('setupArea').style.display = 'block';
                document.getElementById('staffArea').style.display = 'none';
            } else {
                alert("ACCESS DENIED");
            }
        }

        async function removeT(id) { if(confirm("Delete?")) { await _supabase.from('tournament_catalog').delete().eq('id', id); loadTournaments(); } }
        function saveEmailsAndGo() { document.getElementById('emailSetupArea').style.display='none'; document.getElementById('setupArea').style.display='block'; }
        function lockSetup() { document.getElementById('setupArea').style.display='none'; document.getElementById('staffArea').style.display='block'; }
        function resetSystem() { if(confirm("RESET ALL?") && prompt("Type DELETE")==="DELETE") location.reload(); }
    </script>
</body>
</html>
