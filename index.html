<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Prize Manager v3.0 - Royal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary-red: #e63946; --dark: #1d3557; --gold: #ffb703; --green: #2a9d8f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-panel { background: #1d3557; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 5px solid var(--gold); }
        .staff-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: none; }
        .grid-inputs { display: grid; grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr 0.8fr auto; gap: 12px; margin-bottom: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #ccc; text-transform: uppercase; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9rem; }
        .tourney-list { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); margin-top: 10px; }
        .tourney-list td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; color: white !important; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-lock, .btn-close-event { background: #1a7a7a; color: white; width: 100%; margin-top: 15px; font-size: 1.1rem; border-bottom: 3px solid #135e5e; }
        .btn-update { background: var(--primary-red); color: white; }
        .btn-print { background: var(--dark); color: white; }
        .payout-page, .report-page { background: white; width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto; box-sizing: border-box; display: none; }
        .header-payout { text-align: center; border-bottom: 3px solid var(--dark); padding-bottom: 10px; margin-bottom: 20px; }
        table.payout-table, table.report-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .payout-table th, .report-table th { background: var(--dark); color: white; padding: 12px; }
        .payout-table td, .report-table td { padding: 12px; border-bottom: 1px dotted #ccc; text-align: center; }
        @media print { .no-print { display: none !important; } .payout-page, .report-page { display: block !important; } }
    </style>
</head>
<body>

    <div id="login-area" class="no-print">
        <div class="login-card" style="background:white; padding:40px; border-radius:15px; text-align:center; width:350px; margin: 80px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h2 style="color: var(--dark);">CORE PRIZE</h2>
            <input type="text" id="event-id-input" placeholder="EVENT ID" style="width:100%; margin: 20px 0; text-transform: uppercase;">
            <button onclick="checkAccess()" style="background: var(--dark); color: white; width: 100%;">Access System</button>
        </div>
    </div>

    <div id="emailSetupArea" class="no-print" style="display:none; text-align:center; margin-top: 50px;">
        <div class="admin-panel" style="width:400px; margin:auto;">
            <h3>COMMUNICATION SETUP</h3>
            <input type="email" id="toEmail" placeholder="TO Email" style="width:90%; margin-bottom:10px;">
            <input type="email" id="leadEmail" placeholder="Lead Email" style="width:90%; margin-bottom:20px;">
            <button onclick="saveEmailsAndGo()" style="background:var(--green); color:white; width:90%;">START SETUP</button>
        </div>
    </div>

    <div id="setupArea" class="admin-panel no-print" style="display: none;">
        <h3>🛡️ ADMIN SETUP</h3>
        <div class="grid-inputs">
            <input type="text" id="masterEvent" placeholder="Event Name">
            <select id="masterLogo"><option value="REGIONAL">REGIONAL</option><option value="IC">IC</option></select>
            <input type="number" id="masterTax" value="20">
            <select id="masterFactor"><option value="2.0">2.0</option><option value="1.75" selected>1.75</option></select>
        </div>
        <h4>📅 Catalog</h4>
        <div class="grid-inputs">
            <input type="text" id="tName" placeholder="Name">
            <input type="text" id="tHour" placeholder="Hour">
            <input type="number" id="tFee" placeholder="Fee">
            <input type="number" id="tCost" placeholder="Cost">
            <button onclick="addTournament()" style="background:var(--gold);">+ ADD</button>
        </div>
        <table class="tourney-list" id="catalogTable"><tbody></tbody></table>
        <button class="btn-lock" onclick="lockSetup()">🔒 LOCK TO STAFF</button>
        <button class="btn-close-event" onclick="showFinalReport()">📊 FINAL REPORT</button>
    </div>

    <div id="staffArea" class="staff-panel no-print">
        <h3>🕹️ STAFF OPERATION <button onclick="unlockSetup()" style="font-size:0.6rem">Back</button></h3>
        <select id="staffSelectTourney" onchange="updateStaffFee()" style="width:100%; margin-bottom:10px;"></select>
        <input type="number" id="staffPlayers" placeholder="Players" style="width:48%;">
        <input type="number" id="staffFee" disabled style="width:48%;">
        <button class="btn-update" onclick="generatePayout()" style="width:100%; margin-top:10px;">UPDATE VIEW</button>
    </div>

    <div id="printArea" class="payout-page">
        <div class="header-payout">
            <img id="outLogoImg" src="" style="height:60px;">
            <h1 id="outEventName"></h1>
            <h2 id="outTourneyName" style="color:var(--primary-red)"></h2>
            <p id="outDetails"></p>
        </div>
        <table class="payout-table"><thead><tr><th>Rank</th><th>Tickets</th></tr></thead><tbody id="payoutBody"></tbody></table>
    </div>

    <div id="reportArea" class="report-page">
        <div class="header-payout">
            <h1 id="repEventName"></h1>
            <h3>CONSOLIDATED REPORT</h3>
        </div>
        <table class="report-table">
            <thead><tr><th>Tourney</th><th>Players</th><th>Rev</th><th>Exp</th><th>Tickets</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let tournamentCatalog = [];
        let currentEventID = '';

        async function checkAccess() {
            const id = document.getElementById('event-id-input').value.toUpperCase();
            if(id.endsWith('_LEAD')) {
                currentEventID = id;
                document.getElementById('login-area').style.display='none';
                document.getElementById('emailSetupArea').style.display='block';
            } else {
                const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', id+'_LEAD');
                if(data && data.length > 0) {
                    currentEventID = id+'_LEAD';
                    document.getElementById('login-area').style.display='none';
                    document.getElementById('staffArea').style.display='block';
                    loadTournaments();
                } else alert("Access Denied.");
            }
        }

        async function loadTournaments() {
            const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', currentEventID);
            tournamentCatalog = data || [];
            const select = document.getElementById('staffSelectTourney');
            const tbody = document.querySelector('#catalogTable tbody');
            select.innerHTML = ""; tbody.innerHTML = "";
            tournamentCatalog.forEach((t, i) => {
                select.innerHTML += `<option value="${i}">${t.name}</option>`;
                tbody.innerHTML += `<tr><td>${t.name}</td><td><button onclick="removeT(${t.id})">❌</button></td></tr>`;
            });
            updateStaffFee();
        }

        function updateStaffFee() {
            const t = tournamentCatalog[document.getElementById('staffSelectTourney').value];
            if(t) document.getElementById('staffFee').value = t.t_fee;
        }

        function generatePayout() {
            const t = tournamentCatalog[document.getElementById('staffSelectTourney').value];
            const p = parseInt(document.getElementById('staffPlayers').value) || 0;
            const factor = parseFloat(document.getElementById('masterFactor').value);
            const tax = (parseFloat(document.getElementById('masterTax').value) || 0) / 100;
            
            const net = (t.t_fee - t.t_cost) * p * 10;
            const partIndiv = Math.round(((net * tax) / p) / 10) * 10;
            const pool = net - (partIndiv * p);

            // Lógica de Tiers Simplificada para o Teste
            let topRank = p >= 17 ? 8 : (p >= 9 ? 4 : 2);
            let weights = []; let sumW = 0;
            for(let i=0; i<topRank; i++) { 
                let w = Math.pow(factor, (topRank === 8 ? 3 : (topRank === 4 ? 2 : 1)) - Math.floor(i/2)); 
                weights.push(w); sumW += w; 
            }

            const body = document.getElementById('payoutBody'); body.innerHTML = "";
            const labels = ["1st", "2nd", "3rd-4th", "3rd-4th", "5th-8th", "5th-8th", "5th-8th", "5th-8th"];
            
            for(let i=0; i<topRank; i++) {
                let prize = Math.round(((weights[i]/sumW)*pool)/10)*10 + partIndiv;
                body.innerHTML += `<tr><td>${labels[i]}</td><td>${prize.toLocaleString()}</td></tr>`;
            }
            body.innerHTML += `<tr><td>Participation</td><td>${partIndiv}</td></tr>`;

            document.getElementById('outEventName').innerText = document.getElementById('masterEvent').value;
            document.getElementById('outTourneyName').innerText = t.name;
            document.getElementById('outLogoImg').src = document.getElementById('masterLogo').value === "REGIONAL" ? "reg.PNG" : "ic.png";
            document.getElementById('printArea').style.display = 'block';
        }

        function saveEmailsAndGo() { document.getElementById('emailSetupArea').style.display='none'; document.getElementById('setupArea').style.display='block'; }
        function lockSetup() { document.getElementById('setupArea').style.display='none'; document.getElementById('staffArea').style.display='block'; }
        function unlockSetup() { if(prompt("Pass:")==="1234") { document.getElementById('setupArea').style.display='block'; document.getElementById('staffArea').style.display='none'; }}
    </script>
</body>
</html>
