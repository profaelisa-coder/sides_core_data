<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDES CORE DATA - v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-sides { background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 100%); }
    </style>
</head>
<body class="bg-slate-950 min-h-screen p-2 md:p-6 text-slate-800">

    <div id="portal-page" class="flex items-center justify-center min-h-[90vh]">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600 transition-all duration-500">
            <div class="text-center mb-10 border-b pb-6">
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">CORE PRIZE</h1>
                <p class="text-blue-600 font-bold uppercase text-xs tracking-widest mt-1">Sides Data Manager</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2 tracking-wide">ID do Evento</label>
                    <input type="text" id="event-id-input" autocomplete="off" placeholder="Digite o ID fornecido pela organização" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-200 outline-none transition-all text-lg font-bold uppercase text-slate-950">
                </div>
                
                <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase tracking-wide">
                    Acessar Sistema
                </button>
            </div>
            
            <div class="mt-10 pt-6 border-t border-slate-100 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                <span>sides_core_data v1.0 - 2026 Edition</span>
            </div>
        </div>
    </div>

  <div id="control-panel-page" class="hidden max-w-7xl mx-auto space-y-4">
        
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter">SIDES CORE MANAGER DATA</h1>
                    <p id="display-event-id" class="text-blue-600 font-bold uppercase text-xs tracking-widest">EVENT ID</p>
                </div>

                <div class="flex flex-wrap items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Logo Type</label>
                        <select id="event-logo" class="bg-transparent font-bold text-sm outline-none text-slate-700">
                            <option value="REGIONAL">REGIONAL</option>
                            <option value="IC">IC</option>
                        </select>
                    </div>
                    <div class="h-8 w-[1px] bg-slate-200"></div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Participation %</label>
                        <input type="number" id="event-part" placeholder="0" class="bg-transparent font-bold text-sm outline-none w-16 text-slate-700">
                    </div>
                    <div class="h-8 w-[1px] bg-slate-200"></div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Spread Factor</label>
                        <select id="event-spread" class="bg-transparent font-bold text-sm outline-none text-slate-700">
                            <option value="2.0">2.0 (Aggressive)</option>
                            <option value="1.75">1.75 (Balanced)</option>
                            <option value="1.5">1.5 (Flat)</option>
                        </select>
                    </div>
                </div>

                <button onclick="location.reload()" class="text-slate-400 hover:text-red-500 font-black text-[10px] uppercase transition-all">Exit System</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
            <div class="grid grid-cols-1 md:grid-cols-[2fr,1fr,1fr,1fr,1fr,auto] gap-4 items-end">
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Tournament Name</label>
                    <input type="text" id="t-name" placeholder="EX: TURBO R$ 100" class="p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-orange-500 font-bold uppercase text-xs">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Date</label>
                    <select id="t-date" class="p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold text-xs text-slate-700">
                        <option value="DAY 1">DAY 1</option>
                        <option value="DAY 2">DAY 2</option>
                        <option value="DAY 3">DAY 3</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Hour</label>
                    <input type="time" id="t-hour" class="p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold text-xs">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Entry Fee $</label>
                    <input type="number" id="t-fee" placeholder="0" class="p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold text-xs">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Material Cost $</label>
                    <input type="number" id="t-cost" placeholder="0" class="p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold text-xs">
                </div>
                <button onclick="addTournament()" class="bg-orange-500 hover:bg-orange-600 text-white font-black px-6 py-3.5 rounded-lg uppercase text-xs transition-all active:scale-95 shadow-lg shadow-orange-100">
                    +Add
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 space-y-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-wider">
                        <tr>
                            <th class="p-4">Tournament</th>
                            <th class="p-4 text-center">Schedule</th>
                            <th class="p-4 text-center">Fee ($)</th>
                            <th class="p-4 text-center">Cost ($)</th>
                            <th class="p-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tournament-list-body" class="divide-y divide-slate-100 font-bold text-xs text-slate-700 uppercase">
                        </tbody>
                </table>
            </div>

            <div class="pt-6 border-t border-slate-100 flex flex-wrap justify-between gap-4">
                <div class="flex gap-3">
                    <button class="bg-[#3A5B66] hover:bg-[#2D4750] text-white font-black py-3 px-6 rounded-xl uppercase text-[10px] transition-all flex items-center gap-2">
                        🔒 Lock & Open Staff Panel
                    </button>
                    <button class="bg-[#3A5B66] hover:bg-[#2D4750] text-white font-black py-3 px-6 rounded-xl uppercase text-[10px] transition-all flex items-center gap-2">
                        📊 Generate Final Report
                    </button>
                    <button class="bg-[#3A5B66] hover:bg-[#2D4750] text-white font-black py-3 px-6 rounded-xl uppercase text-[10px] transition-all flex items-center gap-2">
                        💾 Download Backup (.txt)
                    </button>
                </div>
                
                <button onclick="resetSystem()" class="bg-orange-500 hover:bg-orange-600 text-white font-black py-3 px-8 rounded-xl uppercase text-[10px] transition-all shadow-lg shadow-orange-100">
                    Reset System
                </button>
            </div>
        </div>
    </div>
    <div id="lead-setup-page" class="hidden min-h-[90vh] flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-green-600">
            <div class="mb-8 border-b pb-6">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Configurar Gestão</h2>
                <p class="text-green-600 text-xs font-bold uppercase tracking-wider mt-1">Primeiro acesso detectado</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="lead-name" placeholder="Nome Completo" autocomplete="off" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
                <input type="email" id="lead-email" placeholder="E-mail" autocomplete="off" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
                <input type="password" id="lead-pass" placeholder="Senha de 6 Dígitos" maxlength="6" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-green-500 font-bold text-sm">
                <button onclick="saveLead()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 uppercase tracking-wide">
                    Confirmar e Iniciar
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentEventID = '';

        // FUNÇÃO AUXILIAR DE MENSAGENS (Em vez de pop-ups chatos)
        function showMessage(type, title, text) {
            // Por enquanto vamos usar o pop-up para fechar a noite, mas amanhã vamos integrar no design
            alert(`${type === 'success' ? '🚀' : '❌'} ${title}\n\n${text}`);
        }

        async function checkAccess() {
            const input = document.getElementById('event-id-input');
            const id = input.value.trim().toUpperCase();
            
            if (!id) return alert("⚠️ Por favor, digite o ID do Evento.");

            // Limpa o campo visualmente para não deixar rastros
            input.value = '';

            // Lógica: Se digitou "CAMPINAS", busca "CAMPINAS_LEAD"
            const searchID = id.endsWith('_LEAD') ? id : id + '_LEAD';

            const { data, error } = await _supabase
                .from('tournament_catalog')
                .select('*')
                .eq('event_id', searchID);

            if (data && data.length > 0) {
                currentEventID = searchID;
                if (id.endsWith('_LEAD')) {
                    // Mágica: Abre o Painel Roxo Profissional
                    document.getElementById('portal-page').classList.add('hidden');
                    document.getElementById('control-panel-page').classList.remove('hidden');
                    document.getElementById('display-event-id').innerText = currentEventID;
                    // loadTournaments(); // Ativaremos no próximo B.S.
                } else {
                    showMessage('success', 'Acesso Staff Concedido', 'O evento foi validado. Redirecionando para a calculadora...');
                }
            } else {
                if (id.endsWith('_LEAD')) {
                    currentEventID = id;
                    document.getElementById('portal-page').classList.add('hidden');
                    document.getElementById('lead-setup-page').classList.remove('hidden');
                } else {
                    showMessage('error', 'Evento Não Encontrado', 'Verifique o ID ou entre em contato com o coordenador da Hive.');
                }
            }
        }

        async function saveLead() {
            const name = document.getElementById('lead-name').value.trim();
            const email = document.getElementById('lead-email').value.trim();
            const pass = document.getElementById('lead-pass').value.trim();

            if (!name || !email || !pass) {
                return alert("⚠️ Por favor, preencha todos os campos.");
            }

            const { data, error } = await _supabase
                .from('tournament_catalog')
                .insert([{ event_id: currentEventID, name: name }])
                .select();

            if (error) {
                console.error("Erro Supabase:", error);
                alert("❌ Houve um erro ao salvar o evento.");
            } else {
                showMessage('success', 'Registro Concluído', `O evento ${currentEventID} foi cadastrado com sucesso.`);
                location.reload(); 
            }
        }
    </script>
</body>
</html>
