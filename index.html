<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Core Prize Manager v3.0 - Royal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() { emailjs.init("MeS3u6lNWc5Ds_1jY"); })();

        function sendPayoutEmail(tournamentData, pdfUrl) {
            const leadEmail = document.getElementById('leadEmail').value;
            const eventName = document.getElementById('masterEvent').value;
            if (!leadEmail) return;
            const templateParams = {
                to_email: leadEmail,
                reply_to: "profa.elisa.almeida.rodrigues@gmail.com",
                tournament_name: tournamentData.t_name,
                event_name: eventName,
                pdf_link: pdfUrl,
                name: eventName
            };
            emailjs.send("service_t4u6ofw", "template_gs6f7j8", templateParams);
        }

        function sendFinalReportEmail(pdfUrl) {
            const toEmail = document.getElementById('toEmail').value;
            const leadEmail = document.getElementById('leadEmail').value;
            const eventName = document.getElementById('masterEvent').value;
            if (!toEmail || !leadEmail) { alert("Check emails!"); return; }
            const templateParams = {
                to_email: `${toEmail}, ${leadEmail}`,
                reply_to: leadEmail,
                event_name: eventName,
                report_date: new Date().toLocaleDateString(),
                pdf_link: pdfUrl,
                name: eventName
            };
            emailjs.send("service_t4u6ofw", "template_qwdh19x", templateParams)
                .then(() => alert("Report sent!"))
                .catch(() => alert("Error sending email."));
        }
    </script>
    <style>
        :root { --primary-red: #e63946; --dark: #1d3557; --gold: #ffb703; --green: #2a9d8f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-panel { background: #1d3557; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 5px solid var(--gold); }
        .staff-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: none; }
        .grid-inputs { display: grid; grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr 0.8fr auto; gap: 12px; margin-bottom: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #ccc; text-transform: uppercase; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9rem; }
        .tourney-list { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); margin-top: 10px; }
        .tourney-list td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; color: white !important; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-lock, .btn-close-event { background: #1a7a7a; color: white; width: 100%; margin-top: 15px; }
        .btn-reset { background: var(--gold); color: #1d3557; width: 100%; margin-top: 15px; border-bottom: 3px solid #cc9200; }
        .btn-update { background: var(--primary-red); color: white; }
        .payout-page { background: white; width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto; display: none; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header-payout { text-align: center; border-bottom: 3px solid var(--dark); padding-bottom: 10px; }
        .report-page { background: white; width: 210mm; padding: 15mm; margin: 20px auto; border-top: 8px solid var(--dark); display: none; }
        .report-header { text-align: center; margin-bottom: 30px; }
        .report-header img { height: 80px; margin-bottom: 10px; }
        .report-header h1 { font-size: 2.2rem; margin: 5px 0; text-transform: uppercase; color: var(--dark); }
        .report-header h3 { font-size: 1.8rem; color: var(--primary-red); text-transform: uppercase; margin-top: 10px; border-top: 2px solid #eee; border-bottom: 2px solid #eee; padding: 10px 0; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .report-table th { border-bottom: 2px solid #ddd; padding: 12px; color: #777; text-transform: uppercase; text-align: center; font-size: 0.8rem; }
        .report-table td { padding: 12px 10px; border-bottom: 1px dotted #ccc; text-align: center; font-weight: bold; color: #333; }
        .row-total td { border-top: 3px solid var(--dark); background: #f9f9f9; font-size: 1.1rem; padding: 15px 10px; color: var(--dark); }
        @media print { .no-print { display: none !important; } .payout-page, .report-page { box-shadow: none; margin: 0; width: 100%; } body { background: white; } }
    </style>
</head>
<body>
    <div id="login-area" class="no-print">
        <div style="background:white; padding:40px; border-radius:15px; text-align:center; width:350px; margin: 80px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h2>CORE PRIZE</h2>
            <input type="password" id="event-id-input" placeholder="ENTER ACCESS CODE" autocomplete="off" style="width:100%; margin: 20px 0; padding:12px; text-align: center; border-radius: 8px;">
            <button onclick="checkAccess()" style="background: var(--dark); color: white; width: 100%;">Access System</button>
        </div>
    </div>
    <div id="emailSetupArea" class="no-print" style="display:none; flex-direction:column; align-items:center; margin-top: 50px;">
        <div class="admin-panel" style="width:450px;">
            <h3 style="text-align:center;">📧 COMMUNICATION SETUP</h3>
            <div class="input-group"><label>TO Email</label><input type="email" id="toEmail" style="margin-bottom:15px;"></div>
            <div class="input-group"><label>Lead Email</label><input type="email" id="leadEmail" style="margin-bottom:25px;"></div>
            <button onclick="saveEmailsAndGo()" style="background:var(--green); color:white; width:100%;">START SETUP</button>
        </div>
    </div>
    <div id="setupArea" class="admin-panel no-print" style="display: none;">
        <h3>🛡️ ADMIN SETUP <button onclick="location.reload()" style="font-size: 0.65rem; float: right;">EXIT</button></h3>
        <div class="grid-inputs">
            <div class="input-group"><label>Event Name</label><input type="text" id="masterEvent" oninput="saveMasterEvent()"></div>
            <div class="input-group"><label>Logo</label><select id="masterLogo"><option value="REGIONAL">REGIONAL</option><option value="IC">IC</option></select></div>
            <div class="input-group"><label>Part. %</label><input type="number" id="masterTax" value="20"></div>
            <div class="input-group"><label>Factor</label><select id="masterFactor"><option value="2.0" selected>2.0</option><option value="1.75">1.75</option><option value="1.5">1.5</option></select></div>
        </div>
        <div class="grid-inputs">
            <input type="text" id="tName" placeholder="Name">
            <input type="text" id="tHour" placeholder="9AM">
            <select id="tDay"><option value="Day 1">Day 1</option><option value="Day 2">Day 2</option><option value="Day 3">Day 3</option></select>
            <input type="number" id="tFee" placeholder="Fee">
            <input type="number" id="tCost" placeholder="Cost">
            <button onclick="addTournament()" style="background:var(--gold);">+ ADD</button>
        </div>
        <table class="tourney-list" id="catalogTable"><tbody></tbody></table>
        <button class="btn-lock" onclick="lockSetup()">🔒 LOCK TO STAFF</button>
        <button class="btn-close-event" onclick="showFinalReport()">📊 GENERATE FINAL REPORT</button>
        <button class="btn-reset" onclick="resetSystem()">⚠️ RESET SYSTEM</button>
    </div>
    <div id="staffArea" class="staff-panel no-print">
        <h3>🕹️ STAFF OPERATION <button onclick="unlockSetup()" style="font-size:0.6rem; float: right;">Back</button></h3>
        <select id="staffSelectTourney" onchange="updateStaffFee()" style="width:100%; margin-bottom:10px; padding:10px;"></select>
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1"><label>Players</label><input type="number" id="staffPlayers" value="0"></div>
            <div class="input-group" style="flex:1"><label>Fee</label><input type="number" id="staffFee" disabled></div>
        </div>
        <button class="btn-update" onclick="generatePayout()" style="width:100%; margin-top:15px; padding:15px;">UPDATE VIEW</button>
    </div>
    <div id="printArea" class="payout-page">
        <div class="header-payout">
            <img id="outLogoImg" src="" style="height:60px;">
            <h1 id="outEventName"></h1>
            <h2 id="outTourneyName" style="color:var(--primary-red);"></h2>
            <p id="outDetails"></p>
        </div>
        <table style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead><tr style="background:var(--dark); color:white;"><th>RANK</th><th>TICKETS</th></tr></thead>
            <tbody id="payoutBody"></tbody>
        </table>
        <div style="text-align:center; margin-top:20px;" class="no-print">
            <button onclick="enviarEPritarPayout()" style="background:var(--dark); color:white; padding:10px 20px;">🖨️ PRINT & SEND</button>
        </div>
    </div>
    <div id="reportArea" class="report-page">
        <div class="report-header">
            <img id="repLogoImg" src="">
            <h1 id="repEventNameHeader"></h1>
            <h2 id="repEventDate"></h2>
            <h3>FINAL REPORT</h3>
        </div>
        <table class="report-table">
            <thead><tr><th>TOURNAMENT</th><th>DAY / HOUR</th><th>PLAYERS</th><th>ENTRY</th><th>COSTS</th><th>TICKETS</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
            <tfoot id="reportFooter"></tfoot>
        </table>
        <div style="text-align:center; margin-top:30px; display: flex; justify-content: center; gap: 20px;" class="no-print">
            <button onclick="window.print()" style="background:var(--primary-red); color:white; padding:15px 30px;">🖨️ PRINT FINAL REPORT</button>
            <button onclick="sendFinalReportEmail(window.lastGeneratedPDF)" style="background:var(--green); color:white; padding:15px 30px;">✉️ SEND TO TO & LEAD</button>
        </div>
    </div>
    <div id="dateModal" class="no-print" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9998; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; text-align:center; width:450px;">
            <h3>REPORT DATE SETUP</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="selMonth"><option value="January">Jan</option><option value="February">Feb</option><option value="March">Mar</option><option value="April">Apr</option><option value="May">May</option><option value="June">Jun</option><option value="July">Jul</option><option value="August">Aug</option><option value="September">Sep</option><option value="October">Oct</option><option value="November">Nov</option><option value="December">Dec</option></select>
                <input type="number" id="selDayStart" value="1" style="width:60px;">
                <input type="number" id="selDayEnd" value="3" style="width:60px;">
                <input type="number" id="selYear" value="2026" style="width:80px;">
            </div>
            <button onclick="finalizeReportWithDate()" style="background:var(--green); color:white; padding:12px;">GENERATE</button>
            <button onclick="closeDateModal()">CANCEL</button>
        </div>
    </div>
    <div id="modalSenha" class="no-print" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; text-align:center; width:300px;">
            <h4>ENTER MASTER PASSWORD</h4>
            <input type="password" id="inputSenhaRetorno" style="width:100%; padding:12px; margin-bottom:15px; text-align:center;">
            <button onclick="confirmarRetorno()" style="background:var(--dark); color:white;">OK</button>
            <button onclick="fecharModal()">CANCEL</button>
        </div>
    </div>
    <script>
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let tournamentCatalog = [];
        let currentEventID = '';
        let historyData = [];
        let emailsConfigured = false;

        function saveMasterEvent() { localStorage.setItem('savedMasterEvent', document.getElementById('masterEvent').value); }
        function loadMasterEvent() { const s = localStorage.getItem('savedMasterEvent'); if (s) document.getElementById('masterEvent').value = s; }

        async function checkAccess() {
            const rawId = document.getElementById('event-id-input').value.trim().toUpperCase();
            if(!rawId) return;
            if (/^[A-Z]{3}\d{4}_LEAD$/.test(rawId)) {
                currentEventID = rawId;
                document.getElementById('login-area').style.display='none';
                if (!emailsConfigured) document.getElementById('emailSetupArea').style.display='flex';
                else { document.getElementById('setupArea').style.display='block'; loadTournaments(); loadHistoryFromCloud(); }
            } else if (/^[A-Z]{3}\d{2}$/.test(rawId)) {
                const searchID = rawId.substring(0, 3) + "20" + rawId.substring(3, 5) + "_LEAD";
                const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', searchID);
                if(data && data.length > 0) {
                    currentEventID = searchID;
                    document.getElementById('login-area').style.display='none';
                    document.getElementById('staffArea').style.display='block';
                    loadTournaments(); loadHistoryFromCloud();
                } else alert("EVENT NOT FOUND");
            }
        }

        function saveEmailsAndGo() {
            emailsConfigured = true;
            document.getElementById('emailSetupArea').style.display='none';
            document.getElementById('setupArea').style.display='block';
            loadMasterEvent(); loadTournaments(); loadHistoryFromCloud();
        }

        async function loadTournaments() {
            const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', currentEventID);
            tournamentCatalog = data || [];
            const select = document.getElementById('staffSelectTourney');
            const tbody = document.querySelector('#catalogTable tbody');
            select.innerHTML = '<option value="">Select...</option>';
            tbody.innerHTML = "";
            tournamentCatalog.forEach((t, i) => {
                select.innerHTML += `<option value="${i}">${t.t_hour} - ${t.t_name} (${t.t_day})</option>`;
                tbody.innerHTML += `<tr><td>${t.t_name} (${t.t_day})</td><td><button onclick="removeT('${t.id}')">❌</button></td></tr>`;
            });
        }

        async function addTournament() {
            const n = document.getElementById('tName').value;
            const h = document.getElementById('tHour').value;
            const d = document.getElementById('tDay').value;
            const f = parseFloat(document.getElementById('tFee').value) || 0;
            const c = parseFloat(document.getElementById('tCost').value) || 0;
            const id = (n + d + h).toLowerCase().replace(/\s+/g, '');
            const tourney = { event_id: currentEventID, id: id, t_name: n, t_hour: h, t_day: d, t_fee: f, t_cost: c };
            const { error } = await _supabase.from('tournament_catalog').insert([tourney]);
            if(error) alert("Error Supabase: " + error.message);
            else { loadTournaments(); document.getElementById('tName').value = ""; }
        }

        function updateStaffFee() {
            const val = document.getElementById('staffSelectTourney').value;
            if(val !== "") document.getElementById('staffFee').value = tournamentCatalog[val].t_fee;
        }

        function generatePayout() {
            const val = document.getElementById('staffSelectTourney').value;
            if(val === "") return alert("Select tourney");
            const t = tournamentCatalog[val];
            const p = parseInt(document.getElementById('staffPlayers').value) || 0;
            const factor = parseFloat(document.getElementById('masterFactor').value);
            const tax = (parseFloat(document.getElementById('masterTax').value) || 0) / 100;
            if(p < 4) return alert("Min 4 players");
            const totalTicketsLimit = Math.max(0, (t.t_fee - t.t_cost) * p * 10);
            const partIndiv = Math.round(((totalTicketsLimit * tax) / p) / 10) * 10;
            const pool = totalTicketsLimit - (partIndiv * p);
            let payoutRank = p >= 227 ? 128 : p >= 129 ? 64 : p >= 65 ? 32 : p >= 33 ? 16 : p >= 17 ? 8 : p >= 9 ? 4 : 2;
            let tiers = [];
            if(payoutRank>=1) tiers.push({name:"1st", count:1}); if(payoutRank>=2) tiers.push({name:"2nd", count:1});
            if(payoutRank>=4) tiers.push({name:"3rd-4th", count:2}); if(payoutRank>=8) tiers.push({name:"5th-8th", count:4});
            if(payoutRank>=16) tiers.push({name:"9th-16th", count:8}); if(payoutRank>=32) tiers.push({name:"17th-32nd", count:16});
            let totalW = 0;
            tiers.forEach((tier, i) => { tier.weight = Math.pow(factor, (tiers.length - 1) - i); totalW += (tier.weight * tier.count); });
            const unit = pool / totalW;
            let currentTotal = (partIndiv * p);
            const body = document.getElementById('payoutBody'); body.innerHTML = "";
            tiers.forEach(tier => {
                let prize = (Math.round((unit * tier.weight) / 10) * 10) + partIndiv;
                body.innerHTML += `<tr><td>${tier.name}</td><td>${prize.toLocaleString()}</td></tr>`;
                currentTotal += (Math.round((unit * tier.weight) / 10) * 10 * tier.count);
            });
            document.getElementById('outEventName').innerText = document.getElementById('masterEvent').value;
            document.getElementById('outTourneyName').innerText = t.t_name;
            document.getElementById('outLogoImg').src = document.getElementById('masterLogo').value === "REGIONAL" ? "reg.PNG" : "ic.png";
            document.getElementById('outDetails').innerText = `Players: ${p} | Fee: $${t.t_fee}`;
            document.getElementById('printArea').style.display = 'block';
            _supabase.from('tournament_history').upsert({ 
                event_id: currentEventID, 
                tournament_id: t.id, 
                tournament_name: t.t_name, 
                schedule: `${t.t_day} - ${t.t_hour}`, 
                players: p, entry_fee: t.t_fee, costs: t.t_cost, total_tickets: currentTotal 
            }, { onConflict: 'event_id, tournament_id' }).then(() => loadHistoryFromCloud());
            uploadPDF('printArea', t.id);
        }

        async function uploadPDF(elementId, fileName) {
            const element = document.getElementById(elementId);
            const canvas = await html2canvas(element, { scale: 1, useCORS: true });
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            await _supabase.storage.from('payouts').upload(`${currentEventID}/${fileName}.pdf`, pdf.output('blob'), { upsert: true });
            const { data: url } = _supabase.storage.from('payouts').getPublicUrl(`${currentEventID}/${fileName}.pdf`);
            window.lastGeneratedPDF = url.publicUrl;
        }

        function enviarEPritarPayout() {
            const val = document.getElementById('staffSelectTourney').value;
            if(val === "") return;
            sendPayoutEmail(tournamentCatalog[val], window.lastGeneratedPDF || window.location.href);
            window.print();
        }

        function finalizeReportWithDate() {
            document.getElementById('repEventDate').innerText = `${document.getElementById('selMonth').value} ${document.getElementById('selDayStart').value}-${document.getElementById('selDayEnd').value}, ${document.getElementById('selYear').value}`;
            const body = document.getElementById('reportTableBody');
            body.innerHTML = "";
            let tP=0, tR=0, tE=0, tT=0;
            historyData.forEach(h => {
                const rev = h.players * h.entry_fee; const exp = h.players * h.costs;
                tP+=h.players; tR+=rev; tE+=exp; tT+=h.total_tickets;
                body.innerHTML += `<tr><td>${h.tournament_name}</td><td>${h.schedule}</td><td>${h.players}</td><td>$${rev}</td><td>$${exp}</td><td>${h.total_tickets.toLocaleString()}</td></tr>`;
            });
            document.getElementById('reportFooter').innerHTML = `<tr class="row-total"><td colspan="2">TOTALS</td><td>${tP}</td><td>$${tR}</td><td>$${tE}</td><td>${tT.toLocaleString()}</td></tr>`;
            document.getElementById('repEventNameHeader').innerText = document.getElementById('masterEvent').value;
            document.getElementById('repLogoImg').src = document.getElementById('masterLogo').value === "REGIONAL" ? "reg.PNG" : "ic.png";
            document.getElementById('dateModal').style.display = 'none'; document.getElementById('reportArea').style.display = 'block';
            uploadPDF('reportArea', 'FINAL_REPORT_' + currentEventID);
        }

        async function loadHistoryFromCloud() {
            const { data } = await _supabase.from('tournament_history').select('*').eq('event_id', currentEventID);
            if(data) historyData = data;
        }

        function unlockSetup() { document.getElementById('modalSenha').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalSenha').style.display = 'none'; }
        function confirmarRetorno() {
            const pass = currentEventID.replace('_LEAD', '');
            if(document.getElementById('inputSenhaRetorno').value.toUpperCase() === pass) {
                document.getElementById('setupArea').style.display = 'block'; document.getElementById('staffArea').style.display = 'none'; fecharModal();
            } else alert("WRONG PASS");
        }
        function lockSetup() { document.getElementById('setupArea').style.display='none'; document.getElementById('staffArea').style.display='block'; }
        function showFinalReport() { document.getElementById('dateModal').style.display = 'flex'; }
        function closeDateModal() { document.getElementById('dateModal').style.display = 'none'; }
        async function removeT(id) { if(confirm("Delete?")) { await _supabase.from('tournament_catalog').delete().eq('id', id); loadTournaments(); } }
        function resetSystem() { if(confirm("RESET ALL?") && prompt("Type DELETE")==="DELETE") { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
